spring.application.name=LuminarApi
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
debug=${SPRING_DEBUG:false}
logging.level.root=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:OFF}

# DataSource configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:${DATABASE_HOST:localhost}}:${DB_PORT:${DATABASE_PORT:3306}}/${DB_NAME:${DATABASE_NAME:crud_tienda}}?useSSL=${DB_USE_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:${DATABASE_USER:root}}
spring.datasource.password=${DB_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate properties
# El esquema se administra con SQL y Spring Data JPA.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

# Server port (8080 is default, setting explicitly)
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:change-me-local}
jwt.expiration=${JWT_EXPIRATION:86400000}

# API Key for backend route protection
app.api-key=${APP_API_KEY:${BACKEND_API_KEY:change-me-local}}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.up.railway.app}

# Resend API Key
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:noreply@mertmadeit.xyz}
